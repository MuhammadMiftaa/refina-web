# ─── Gzip (fallback untuk browser tanpa Brotli support) ──────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_types
    text/plain
    text/css
    text/javascript
    text/xml
    text/x-component
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-font-opentype
    application/x-font-truetype
    image/svg+xml
    image/x-icon
    font/opentype
    font/ttf
    font/eot
    font/otf;

# ─── Brotli (harus didukung oleh modul nginx brotli) ─────────────────────────
brotli on;
brotli_comp_level 6;
brotli_min_length 1024;
brotli_static on;   # serve pre-compressed .br file langsung dari disk
brotli_types
    text/plain
    text/css
    text/javascript
    text/xml
    text/x-component
    application/javascript
    application/x-javascript
    application/json
    application/xml
    application/rss+xml
    application/atom+xml
    application/vnd.ms-fontobject
    application/x-font-ttf
    application/x-font-opentype
    application/x-font-truetype
    image/svg+xml
    image/x-icon
    font/opentype
    font/ttf
    font/eot
    font/otf;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ─────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "SAMEORIGIN"      always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # ─── React Router SPA fallback ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Runtime env config – tidak di-cache ─────────────────────────────────
    location = /env.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # ─── index.html – tidak di-cache ─────────────────────────────────────────
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # ─── Service Worker – tidak di-cache (agar update SW instan) ─────────────
    location ~* (sw\.js|registerSW\.js|workbox-.+\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # ─── Hashed static assets (JS/CSS dari Vite) – cache selamanya ───────────
    # Vite menghasilkan nama file dengan hash (mis. index-BxYz1234.js)
    # sehingga aman di-cache secara permanen (immutable)
    location ~* \.(js|css|mjs)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Aktifkan pre-compressed Brotli / Gzip dari disk
        gzip_static on;
        brotli_static on;
    }

    # ─── Font files – cache 1 tahun ───────────────────────────────────────────
    location ~* \.(woff2|woff|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    # ─── Gambar & ikon – cache 30 hari ───────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # ─── Web App Manifest ─────────────────────────────────────────────────────
    location ~* \.(webmanifest|manifest\.json)$ {
        add_header Cache-Control "no-cache";
        expires 0;
    }
}